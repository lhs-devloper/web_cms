<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{common.title} + ' - ' + #{board.edit}">Edit Board - CMS PRO</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <aside th:replace="~{admin/fragments/sidebar :: sidebar('board')}"></aside>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="search-bar" th:if="${board != null}">
                <i class="fas fa-edit" style="margin-right: 1rem; color: #64748b;"></i>
                <span th:text="#{board.edit} + ' / ' + ${board.boardId}">Edit Board</span>
            </div>
            <div class="user-profile" style="display: flex; align-items: center; gap: 1rem;">
                <div
                    style="width: 40px; height: 40px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">
                    AD
                </div>
                <span style="font-weight: 600; color: #1e293b;">Administrator</span>
            </div>
        </header>

        <main class="content-body">
            <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;">
                <a href="/admin/board" style="color: #64748b; text-decoration: none;"><i
                        class="fas fa-chevron-left"></i> <span th:text="#{common.back_list}">Back to List</span></a>
            </div>

            <div th:if="${board == null}" style="text-align: center; padding: 5rem;">
                <h3 style="color: #64748b;">Board not found.</h3>
                <a href="/admin/board" class="btn-save"
                    style="display: inline-block; margin-top: 1rem; text-decoration: none;"
                    th:text="#{common.back_list}">Return to List</a>
            </div>

            <div class="settings-container" th:if="${board != null}">
                <section class="settings-section">
                    <h4 th:text="#{board.edit} + ': /' + ${board.boardId}">Board Settings</h4>
                    <p style="color: #64748b; font-size: 0.875rem; margin-bottom: 2rem;" th:text="#{board.edit.desc}">
                        Modify permissions for the dynamic board. Note: Board ID cannot be changed once created.</p>

                    <form th:action="@{/admin/board/update}" method="POST">
                        <input type="hidden" name="boardId" th:value="${board.boardId}">

                        <div class="form-group">
                            <label th:text="#{board.id}">Board ID</label>
                            <input type="text" class="form-control" th:value="${board.boardId}" disabled
                                style="background: #f1f5f9; cursor: not-allowed;">
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
                            <div class="form-group">
                                <label><i class="fas fa-eye" style="margin-right: 0.5rem; color: #6366f1;"></i> <span
                                        th:text="#{board.table.read_perm}">Read Permission</span></label>
                                <select name="readPermission" class="form-control" style="background: white;">
                                    <option value="ALL" th:selected="${board.readPermission == 'ALL'}">Everyone
                                        (Publicly visible)</option>
                                    <option value="MEMBER" th:selected="${board.readPermission == 'MEMBER'}">Members
                                        Only (Requires login)</option>
                                    <option value="ADMIN" th:selected="${board.readPermission == 'ADMIN'}">Administrator
                                        Only</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-pen" style="margin-right: 0.5rem; color: #6366f1;"></i> <span
                                        th:text="#{board.table.write_perm}">Write Permission</span></label>
                                <select name="writePermission" class="form-control" style="background: white;">
                                    <option value="ALL" th:selected="${board.writePermission == 'ALL'}">Everyone
                                        (Include guests)</option>
                                    <option value="MEMBER" th:selected="${board.writePermission == 'MEMBER'}">Members
                                        Only</option>
                                    <option value="ADMIN" th:selected="${board.writePermission == 'ADMIN'}">
                                        Administrator Only</option>
                                </select>
                            </div>
                        </div>

                        <div
                            style="background: #f8fafc; padding: 1.25rem; border-radius: 0.75rem; margin: 1.5rem 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div
                                    style="width: 40px; height: 40px; background: #e0e7ff; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                                    <i class="fas fa-bell" style="color: #6366f1; font-size: 1.1rem;"></i>
                                </div>
                                <div>
                                    <h5 style="font-size: 0.95rem; font-weight: 700; color: #1e293b; margin-bottom: 0.15rem;"
                                        th:text="#{board.check_update}">Track Updates</h5>
                                    <p style="font-size: 0.8rem; color: #64748b; margin: 0;"
                                        th:text="#{board.check_update.desc}">Show latest posts on dashboard.</p>
                                </div>
                            </div>
                            <label class="switch">
                                <input type="checkbox" name="checkUpdate" th:checked="${board.checkUpdate}">
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <div
                            style="background: #e0f2fe; padding: 1.5rem; border-radius: 0.75rem; margin: 2rem 0; border: 1px solid #bae6fd;">
                            <h5
                                style="font-size: 0.9rem; font-weight: 700; color: #0369a1; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                                <i class="fas fa-database"></i> <span th:text="#{board.db_info}">Database
                                    Information</span>
                            </h5>
                            <p style="font-size: 0.8rem; color: #075985;">
                                <span th:text="#{board.db_info.desc}">This board is linked to table:</span> <code
                                    style="font-weight: 700; background: #f1f5f9; padding: 0.1rem 0.3rem;"
                                    th:text="${board.tableName}"></code>
                            </p>
                        </div>

                        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 3rem;">
                            <a href="/admin/board"
                                style="padding: 0.75rem 1.5rem; color: #64748b; text-decoration: none; font-weight: 600;"
                                th:text="#{common.cancel}">Cancel</a>
                            <button type="submit" class="btn-save" style="padding: 0.75rem 2.5rem;"
                                th:text="#{common.save}">Save Changes</button>
                        </div>
                    </form>
                </section>
            </div>
        </main>
    </div>
</body>

</html>
