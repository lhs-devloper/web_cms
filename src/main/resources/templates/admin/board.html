<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{common.title} + ' - ' + #{board.title}">Board Management - CMS PRO</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <aside th:replace="~{admin/fragments/sidebar :: sidebar('board')}"></aside>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="search-bar">
                <i class="fas fa-search" style="margin-right: 0.5rem;"></i>
                <span th:text="#{common.search_placeholder}">Search boards...</span>
            </div>
            <div class="user-profile" style="display: flex; align-items: center; gap: 1rem;">
                <div
                    style="width: 40px; height: 40px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">
                    AD
                </div>
                <span style="font-weight: 600; color: #1e293b;">Administrator</span>
            </div>
        </header>

        <main class="content-body">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 style="font-weight: 800; font-size: 1.75rem; letter-spacing: -0.025em; color: #1e293b;"
                        th:text="#{board.title}">Board Management</h2>
                    <p style="color: #64748b; margin-top: 0.5rem;" th:text="#{board.desc}">Create and manage dynamic
                        board tables (cms_board_*).</p>
                </div>
                <a href="/admin/board/new" class="btn-save"
                    style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-plus"></i> <span th:text="#{board.create}">Create New Board</span>
                </a>
            </div>

            <!-- Alerts -->
            <div th:if="${message}"
                style="background: #dcfce7; color: #166534; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; border: 1px solid #bbf7d0;">
                <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
            </div>
            <div th:if="${error}"
                style="background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; border: 1px solid #fecaca;">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <div class="data-section">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border);">
                            <th style="text-align: left; padding: 1.25rem 1rem;" th:text="#{board.table.id}">ID</th>
                            <th style="padding: 1.25rem 1rem; text-align: left;" th:text="#{board.table.read_perm}">Read
                                Perm.</th>
                            <th style="padding: 1.25rem 1rem; text-align: left;" th:text="#{board.table.write_perm}">
                                Write Perm.</th>
                            <th style="text-align: left; padding: 1.25rem 1rem;" th:text="#{board.table.name}">Table
                                Name</th>
                            <th style="text-align: left; padding: 1.25rem 1rem;" th:text="#{board.check_update}">Track
                                Updates</th>
                            <th style="text-align: left; padding: 1.25rem 1rem;" th:text="#{board.table.date}">Created
                                At</th>
                            <th style="text-align: right; padding: 1.25rem 1rem;" th:text="#{common.actions}">Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="board : ${boards}" style="border-bottom: 1px solid var(--border);">
                            <td style="padding: 1.25rem 1rem; font-weight: 700; color: #1e293b;"
                                th:text="${board.boardId}"></td>
                            <td style="padding: 1.25rem 1rem;">
                                <span class="badge" th:text="${board.readPermission}"
                                    th:style="${board.readPermission == 'ALL' ? 'background: #dcfce7; color: #166534;' : (board.readPermission == 'ADMIN' ? 'background: #fee2e2; color: #991b1b;' : 'background: #e0e7ff; color: #4338ca;')}"></span>
                            </td>
                            <td style="padding: 1.25rem 1rem;">
                                <span class="badge" th:text="${board.writePermission}"
                                    th:style="${board.writePermission == 'ALL' ? 'background: #dcfce7; color: #166534;' : (board.writePermission == 'ADMIN' ? 'background: #fee2e2; color: #991b1b;' : 'background: #e0e7ff; color: #4338ca;')}"></span>
                            </td>
                            <td style="padding: 1.25rem 1rem; color: #64748b; font-family: monospace; font-size: 0.85rem;"
                                th:text="${board.tableName}"></td>
                            <td style="padding: 1.25rem 1rem; text-align: center;">
                                <i th:class="${board.checkUpdate ? 'fas fa-check-circle' : 'far fa-circle'}"
                                    th:style="${board.checkUpdate ? 'color: #10b981;' : 'color: #cbd5e1;'}"></i>
                            </td>
                            <td style="padding: 1.25rem 1rem; color: #64748b;"
                                th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td
                                style="padding: 1.25rem 1rem; text-align: right; display: flex; justify-content: flex-end; gap: 0.5rem;">
                                <a th:href="@{/admin/board/edit/{id}(id=${board.boardId})}"
                                    style="color: #94a3b8; transition: color 0.2s; text-decoration: none;"
                                    onmouseover="this.style.color='#6366f1'" onmouseout="this.style.color='#94a3b8'">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/admin/board/delete}" method="POST"
                                    th:onsubmit="return confirm([[#{board.delete.confirm}]]);" style="display: inline;">
                                    <input type="hidden" name="boardId" th:value="${board.boardId}">
                                    <button type="submit"
                                        style="background: none; border: none; padding: 0; color: #94a3b8; cursor: pointer; transition: color 0.2s;"
                                        onmouseover="this.style.color='#ef4444'"
                                        onmouseout="this.style.color='#94a3b8'">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(boards)}">
                            <td colspan="7" style="padding: 4rem; text-align: center; color: #94a3b8;">
                                <i class="fas fa-folder-open"
                                    style="font-size: 2.5rem; margin-bottom: 1rem; display: block;"></i>
                                <span th:text="#{board.list.empty}">No boards found. Create your first board to get
                                    started.</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>

</html>
