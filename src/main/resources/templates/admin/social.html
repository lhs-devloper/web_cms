<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{common.title} + ' - Social Services'">Social Services - CMS PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .provider-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .provider-card {
            display: flex;
            align-items: center;
            padding: 1.25rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .provider-card:hover {
            border-color: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .provider-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            flex-shrink: 0;
            font-size: 1.25rem;
        }

        .provider-icon svg {
            width: 24px;
            height: 24px;
        }

        .icon-google {
            background: white;
            border: 1px solid #e2e8f0;
        }

        .icon-naver {
            background: #03C75A;
            fill: white;
        }

        .icon-kakao {
            background: #FEE500;
            fill: #191919;
        }

        .icon-github {
            background: #181717;
            fill: white;
        }

        .icon-apple {
            background: black;
            fill: white;
        }

        .icon-default {
            background: #f1f5f9;
            color: #64748b;
        }

        .provider-card.inactive .provider-icon {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 600;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
        }

        .status-inactive {
            background: #f1f5f9;
            color: #64748b;
        }
    </style>
</head>

<body>
    <aside th:replace="~{admin/fragments/sidebar :: sidebar('social')}"></aside>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="search-bar">
                <i class="fas fa-comment-dots" style="margin-right: 0.5rem;"></i>
                <span>Social Service Management</span>
            </div>
            <div class="user-profile" style="display: flex; align-items: center; gap: 1rem;">
                <div
                    style="width: 40px; height: 40px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">
                    AD
                </div>
                <span style="font-weight: 600; color: #1e293b;">Administrator</span>
            </div>
        </header>

        <main class="content-body">
            <div style="margin-bottom: 2rem;">
                <h2 style="font-weight: 800; font-size: 1.75rem;" th:text="#{social.title}">Social Service Management
                </h2>
                <p style="color: #64748b; margin-top: 0.5rem;" th:text="#{social.desc}">Manage OAuth2 Social Login
                    Providers. Changes require
                    application restart to take effect.</p>
            </div>

            <div th:if="${message}"
                style="background: #dcfce7; color: #166534; padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem; border: 1px solid #bbf7d0;">
                <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
            </div>
            <div th:if="${error}"
                style="background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem; border: 1px solid #fecaca;">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 350px; gap: 2rem;">

                <!-- Form -->
                <section class="data-section" style="padding: 2rem;">
                    <h4 id="form-title" style="margin-bottom: 1.5rem; font-weight: 700;" th:text="#{social.form.edit}">
                        Edit Provider</h4>
                    <form th:action="@{/admin/social/save}" method="POST" id="socialForm">
                        <input type="hidden" name="id" id="id">

                        <div class="form-group"
                            style="margin-bottom: 1.5rem; background: #f8fafc; padding: 1rem; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin: 0;">
                                <input type="checkbox" name="isActive" id="isActive"
                                    style="width: 1.2rem; height: 1.2rem;">
                                <span style="font-weight: 600; color: #1e293b;">Enable this provider (Active)</span>
                            </label>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label th:text="#{social.field.reg_id}">Registration ID</label>
                                <input type="text" name="registrationId" id="registrationId" class="form-control"
                                    placeholder="e.g. google" required readonly style="background-color: #f1f5f9;">
                            </div>
                            <div class="form-group">
                                <label th:text="#{social.field.client_name}">Client Name</label>
                                <input type="text" name="clientName" id="clientName" class="form-control"
                                    placeholder="e.g. Google" required>
                            </div>
                        </div>

                        <div class="form-group" style="margin-top: 1rem;">
                            <label th:text="#{social.field.client_id}">Client ID</label>
                            <input type="text" name="clientId" id="clientId" class="form-control" required>
                        </div>
                        <div class="form-group" style="margin-top: 1rem;">
                            <label th:text="#{social.field.client_secret}">Client Secret</label>
                            <input type="text" name="clientSecret" id="clientSecret" class="form-control" required>
                        </div>

                        <div class="form-group" style="margin-top: 1rem;">
                            <label th:text="#{social.field.scopes}">Scopes (comma separated)</label>
                            <input type="text" name="scopes" id="scopes" class="form-control"
                                placeholder="email,profile">
                        </div>
                        <div class="form-group" style="margin-top: 1rem;">
                            <label th:text="#{social.field.redirect}">Redirect URI</label>
                            <input type="text" name="redirectUri" id="redirectUri" class="form-control"
                                value="{baseUrl}/{action}/oauth2/code/{registrationId}">
                        </div>

                        <div style="margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1rem;">
                            <h5 style="margin-bottom: 1rem; color: #475569;" th:text="#{social.adv.title}">Advanced
                                Provider Settings (Optional)</h5>
                            <div class="form-group">
                                <label th:text="#{social.field.auth_uri}">Authorization URI</label>
                                <input type="text" name="authorizationUri" id="authorizationUri" class="form-control">
                            </div>
                            <div class="form-group" style="margin-top: 1rem;">
                                <label th:text="#{social.field.token_uri}">Token URI</label>
                                <input type="text" name="tokenUri" id="tokenUri" class="form-control">
                            </div>
                            <div class="form-group" style="margin-top: 1rem;">
                                <label th:text="#{social.field.user_info}">User Info URI</label>
                                <input type="text" name="userInfoUri" id="userInfoUri" class="form-control">
                            </div>
                            <div class="form-group" style="margin-top: 1rem;">
                                <label th:text="#{social.field.user_attr}">User Name Attribute</label>
                                <input type="text" name="userNameAttributeName" id="userNameAttributeName"
                                    class="form-control" placeholder="e.g. sub, id, response">
                            </div>
                        </div>

                        <!-- Hidden defaults for simplicity -->
                        <input type="hidden" name="authorizationGrantType" value="authorization_code">
                        <input type="hidden" name="clientAuthenticationMethod" value="client_secret_post">

                        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                            <button type="submit" class="btn-save" style="flex: 1;" th:text="#{social.btn.save}">Save
                                Changes</button>
                            <button type="button" class="btn-save" style="background: #ef4444; width: auto;"
                                onclick="deleteProvider()" th:text="#{social.btn.delete}">Delete</button>
                        </div>
                    </form>

                    <form id="deleteForm" th:action="@{/admin/social/delete}" method="POST" style="display: none;">
                        <input type="hidden" name="id" id="deleteId">
                    </form>
                </section>

                <!-- List -->
                <section class="data-section">
                    <h4 style="margin-bottom: 1rem;" th:text="#{social.list.title}">Providers</h4>
                    <div class="provider-list">
                        <div th:each="social : ${socials}" class="provider-card"
                            th:classappend="${!social.isActive} ? 'inactive'" th:onclick="loadForm([[${social}]])">

                            <div class="provider-icon" th:classappend="|icon-${social.registrationId}|">
                                <!-- Google -->
                                <svg th:if="${social.registrationId == 'google'}" viewBox="12 10 20 20"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M31.6 20.2273C31.6 19.5182 31.5364 18.8364 31.4182 18.1818H22V22.05H27.3818C27.15 23.3 26.4455 24.3591 25.3864 25.0682V27.5773H28.6182C30.5091 25.8364 31.6 23.2727 31.6 20.2273Z"
                                        fill="#4285F4" />
                                    <path
                                        d="M22 30C24.7 30 26.9636 29.1045 28.6181 27.5773L25.3863 25.0682C24.4909 25.6682 23.3454 26.0227 22 26.0227C19.3954 26.0227 17.1909 24.2636 16.4045 21.9H13.0636V24.4909C14.7091 27.7591 18.0909 30 22 30Z"
                                        fill="#34A853" />
                                    <path
                                        d="M16.4045 21.9C16.2045 21.3 16.0909 20.6591 16.0909 20C16.0909 19.3409 16.2045 18.7 16.4045 18.1V15.5091H13.0636C12.3864 16.8591 12 18.3864 12 20C12 21.6136 12.3864 23.1409 13.0636 24.4909L16.4045 21.9Z"
                                        fill="#FBBC04" />
                                    <path
                                        d="M22 13.9773C23.4681 13.9773 24.7863 14.4818 25.8227 15.4727L28.6909 12.6045C26.9591 10.9909 24.6954 10 22 10C18.0909 10 14.7091 12.2409 13.0636 15.5091L16.4045 18.1C17.1909 15.7364 19.3954 13.9773 22 13.9773Z"
                                        fill="#E94235" />
                                </svg>
                                <!-- Naver -->
                                <svg th:if="${social.registrationId == 'naver'}" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M16.273 12.845 7.376 0H0v24h7.726V11.156L16.624 24H24V0h-7.727v12.845Z" />
                                </svg>
                                <!-- Kakao -->
                                <svg th:if="${social.registrationId == 'kakao'}" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M12 3C5.925 3 1 6.925 1 11.775C1 14.75 2.875 17.375 5.725 18.9L4.575 23.1L8.725 20.35C9.775 20.675 10.875 20.85 12 20.85C18.075 20.85 23 16.925 23 12.075C23 6.925 18.075 3 12 3Z" />
                                </svg>
                                <!-- Github -->
                                <svg th:if="${social.registrationId == 'github'}" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                                </svg>
                                <!-- Apple -->
                                <svg th:if="${social.registrationId == 'apple'}" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701" />
                                </svg>
                                <!-- Default -->
                                <i th:unless="${#lists.contains({'google','naver','kakao','github','apple'}, social.registrationId)}"
                                    class="fas fa-key" style="color: #cbd5e1;"></i>
                            </div>

                            <div style="flex: 1;">
                                <strong th:text="${social.clientName}"
                                    style="display: block; color: #1e293b; font-size: 1rem; margin-bottom: 0.125rem;">Name</strong>
                                <span th:if="${social.isActive}" class="status-badge status-active">Active</span>
                                <span th:unless="${social.isActive}"
                                    class="status-badge status-inactive">Inactive</span>
                            </div>
                            <i class="fas fa-chevron-right" style="color: #cbd5e1;"></i>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        function loadForm(social) {
            document.getElementById('form-title').innerText = 'Edit ' + social.clientName;
            document.getElementById('id').value = social.id;
            document.getElementById('registrationId').value = social.registrationId;
            document.getElementById('clientName').value = social.clientName;
            document.getElementById('clientId').value = social.clientId;
            document.getElementById('clientSecret').value = social.clientSecret;
            document.getElementById('scopes').value = social.scopes;
            document.getElementById('redirectUri').value = social.redirectUri;
            document.getElementById('isActive').checked = social.active;

            document.getElementById('authorizationUri').value = social.authorizationUri || '';
            document.getElementById('tokenUri').value = social.tokenUri || '';
            document.getElementById('userInfoUri').value = social.userInfoUri || '';
            document.getElementById('userNameAttributeName').value = social.userNameAttributeName || '';
        }

        function deleteProvider() {
            const id = document.getElementById('id').value;
            if (!id) return;
            if (confirm('Are you sure you want to delete this provider?')) {
                document.getElementById('deleteId').value = id;
                document.getElementById('deleteForm').submit();
            }
        }
    </script>
</body>

</html>
