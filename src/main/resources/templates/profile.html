<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - CMS PRO</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <nav th:replace="~{fragments/header :: header('home')}"></nav>

    <div class="container" style="max-width: 800px; padding-top: 2rem;">
        <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 2rem; color: #1e293b;">My Profile</h1>

        <!-- Alerts -->
        <div th:if="${message}"
            style="background: #dcfce7; color: #166534; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; border: 1px solid #bbf7d0;">
            <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
        </div>
        <div th:if="${error}"
            style="background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; border: 1px solid #fecaca;">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div style="display: grid; gap: 2rem;">
            <!-- Profile Info Card -->
            <div
                style="background: white; padding: 2rem; border-radius: 1rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                <h2
                    style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;">
                    Basic Information</h2>

                <form th:action="@{/profile/update}" method="POST" enctype="multipart/form-data">
                    <div style="display: flex; gap: 2rem; align-items: flex-start;">
                        <!-- Profile Image -->
                        <div style="flex-shrink: 0; position: relative; cursor: pointer;"
                            onclick="document.getElementById('profileImageInput').click()">
                            <input type="file" name="file" id="profileImageInput" accept="image/*"
                                style="display: none;" onchange="previewImage(this)">

                            <div
                                style="position: relative; width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #f1f5f9;">
                                <img id="profilePreview" th:if="${user.picture != null}" th:src="${user.picture}"
                                    style="width: 100%; height: 100%; object-fit: cover;">
                                <div id="profilePlaceholder" th:if="${user.picture == null}"
                                    style="width: 100%; height: 100%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-size: 2.5rem;">
                                    <i class="fas fa-user"></i>
                                </div>
                                <!-- Hover Overlay -->
                                <div class="image-overlay"
                                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; color: white; opacity: 0; transition: opacity 0.2s;">
                                    <i class="fas fa-camera"></i>
                                </div>
                            </div>
                            <style>
                                .image-overlay:hover {
                                    opacity: 1;
                                }
                            </style>
                        </div>

                        <!-- Inputs -->
                        <div style="flex: 1; display: grid; gap: 1rem;">
                            <div>
                                <label
                                    style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 0.5rem;">Email</label>
                                <input type="text" th:value="${user.email}" readonly
                                    style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; background: #f8fafc; color: #94a3b8; cursor: not-allowed;">
                                <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem;">
                                    <i class="fas fa-info-circle"></i> Signed up via <span
                                        th:text="${user.provider}">LOCAL</span>
                                </p>
                            </div>
                            <div>
                                <label
                                    style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 0.5rem;">Name</label>
                                <input type="text" name="name" th:value="${user.name}" required
                                    style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-weight: 600; color: #1e293b;">
                            </div>
                            <div style="text-align: right; margin-top: 0.5rem;">
                                <button type="submit" class="btn-primary">Update Profile</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Password Change Card (Only for LOCAL users) -->
            <div th:if="${user.provider.name() == 'LOCAL'}"
                style="background: white; padding: 2rem; border-radius: 1rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                <h2
                    style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;">
                    Change Password</h2>

                <form th:action="@{/profile/password}" method="POST">
                    <div style="display: grid; gap: 1rem;">
                        <div>
                            <label
                                style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 0.5rem;">Current
                                Password</label>
                            <input type="password" name="currentPassword" required
                                style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div>
                                <label
                                    style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 0.5rem;">New
                                    Password</label>
                                <input type="password" name="newPassword" required
                                    style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                            </div>
                            <div>
                                <label
                                    style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 0.5rem;">Confirm
                                    New Password</label>
                                <input type="password" name="confirmPassword" required
                                    style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                            </div>
                        </div>
                        <div style="text-align: right; margin-top: 0.5rem;">
                            <button type="submit" class="btn-primary" style="background: #0f172a;">Change
                                Password</button>
                        </div>
                    </div>
                </form>
            </div>

            <div th:if="${user.provider.name() != 'LOCAL'}"
                style="background: #f8fafc; padding: 2rem; border-radius: 1rem; border: 1px solid #e2e8f0; text-align: center; color: #64748b;">
                <i class="fas fa-lock"
                    style="font-size: 2rem; margin-bottom: 1rem; display: block; color: #cbd5e1;"></i>
                <p>Because you logged in with <strong><span th:text="${user.provider}">Social</span></strong>, you
                    cannot change your password here.</p>
            </div>
        </div>
    </div>

    <footer>
        <p th:text="${siteSetting.footerCopyright}">© 2024 All rights reserved.</p>
    </footer>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    var preview = document.getElementById('profilePreview');
                    var placeholder = document.getElementById('profilePlaceholder');

                    if (preview) {
                        preview.src = e.target.result;
                    } else if (placeholder) {
                        placeholder.style.display = 'none';
                        var img = document.createElement('img');
                        img.id = 'profilePreview';
                        img.style.width = '100%';
                        img.style.height = '100%';
                        img.style.objectFit = 'cover';
                        img.src = e.target.result;
                        placeholder.parentElement.insertBefore(img, placeholder); // Insert before placeholder
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>

</html>
