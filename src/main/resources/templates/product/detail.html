<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name + ' - CMS PRO Shop'}">Product Detail</title>
    <!-- Common Head -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .detail-container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .product-image-area {
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #f8fafc;
        }

        .product-main-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .product-details h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .category-label {
            display: inline-block;
            background: #e0e7ff;
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .price-tag {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 1.5rem 0;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .price-unit {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .description-box {
            color: #334155;
            line-height: 1.7;
            margin-bottom: 2rem;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .btn-buy {
            flex: 2;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-buy:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-cart {
            flex: 1;
            background: white;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cart:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .stock-badge {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .detail-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }
    </style>
</head>

<body>
    <nav th:replace="~{fragments/header :: header('shop')}"></nav>

    <div class="detail-container">
        <div class="product-image-area">
            <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/600x600?text=No+Image'}"
                alt="Product Image" class="product-main-img">
        </div>

        <div class="product-details">
            <span class="category-label" th:text="${product.category.name}">Category</span>
            <h1 th:text="${product.name}">Product Name</h1>
            <div class="stock-badge">
                <i class="fas fa-box"></i>
                Stock: <span
                    th:text="${product.stockType.name() == 'UNLIMITED' ? 'Unlimited' : product.stockQuantity}">10</span>
            </div>

            <div class="price-tag">
                <span th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')}">10,000</span>
                <span class="price-unit">KRW</span>
            </div>

            <div class="description-box" th:text="${product.description}">
                Product description goes here...
            </div>

            <div class="actions">
                <!-- Add to Cart / Buy Now logic needs to be implemented later -->
                <button class="btn-cart"><i class="fas fa-shopping-cart" style="margin-right: 0.5rem;"></i>
                    Cart</button>
                <button class="btn-buy">Buy Now</button>
            </div>
        </div>
    </div>

    <footer th:replace="~{main :: footer}"></footer>
</body>

</html>
