<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - CMS PRO</title>
    <!-- Common Head -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .shop-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 5%;
        }

        .page-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .page-desc {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .product-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            background: #f1f5f9;
        }

        .product-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-top: auto;
        }

        /* Skeleton / Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <nav th:replace="~{fragments/header :: header('shop')}"></nav>

    <div class="shop-container">
        <header class="page-header">
            <h1 class="page-title">Shop</h1>
            <p class="page-desc">Discover our digital and physical goods.</p>
        </header>

        <div class="category-filter">
            <a href="/products" class="filter-btn active">All</a>
            <a th:each="cat : ${categories}" th:href="@{/products(category=${cat.id})}" class="filter-btn"
                th:text="${cat.name}">Category</a>
        </div>

        <div class="product-grid">
            <a th:each="product : ${products}" th:if="${product.isActive}" th:href="@{/products/{id}(id=${product.id})}"
                class="product-card">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/400x400?text=No+Image'}"
                    alt="Product Name" class="product-thumb">
                <div class="product-info">
                    <div class="product-category" th:text="${product.category.name}">Category</div>
                    <h3 class="product-name" th:text="${product.name}">Product Name</h3>
                    <div class="product-price" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + ' KRW'">
                        10,000 KRW</div>
                </div>
            </a>

            <div th:if="${products.empty}" class="empty-state">
                <i class="fas fa-box-open" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <p>No products available at the moment.</p>
            </div>
        </div>
    </div>

    <footer th:replace="~{main :: footer}"></footer>
</body>

</html>
