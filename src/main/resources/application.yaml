server:
  servlet:
    session:
      timeout: 1h # 세션 타임아웃을 1분으로 설정 (활동이 없으면 1분 후 자동 파괴)
  tomcat:
    max-http-form-post-size: -1
    max-swallow-size: -1
    max-parameter-count: -1
    max-part-count: 100

# Custom File Storage Configuration
app:
  upload:
    dir: uploads/

spring:
  application:
    name: cmsproject
  datasource:
    url: jdbc:mariadb://localhost:3306/cmsproject
    username: root
    password: 1234
    driver-class-name: org.mariadb.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false 

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-google-id
            client-secret: dummy-google-secret
            scope:
              - email
              - profile
          naver:
            client-id: HdSZDeK8myvxNRSsLgqy
            client-secret: jS5eVhfl_5
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver
          kakao:
            client-id: dummy-kakao-id
            client-secret: dummy-kakao-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
          github:
            client-id: dummy-github-id
            client-secret: dummy-github-secret
            scope:
              - read:user
              - user:email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id 

  messages:
    basename: messages
    encoding: UTF-8

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    doc-expansion: list
