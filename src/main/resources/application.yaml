server:
  servlet:
    session:
      timeout: 1m # 세션 타임아웃을 1분으로 설정 (활동이 없으면 1분 후 자동 파괴)

# Custom File Storage Configuration
app:
  upload:
    dir: /Users/leehyeonseo/Desktop/cmsproject/uploads/

spring:
  application:
    name: cmsproject
  datasource:
    url: jdbc:mariadb://localhost:3306/cmsproject
    username: root
    password: 1234
    driver-class-name: org.mariadb.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false 

  messages:
    basename: messages
    encoding: UTF-8

  thymeleaf:
    prefix: classpath:/templates/
    check-template-location: true
    suffix: .html
    mode: HTML
    cache: false
