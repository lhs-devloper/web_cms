<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS 초기 설정</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #e2e8f0; }
        .setup-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 3rem; width: 100%; max-width: 440px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .setup-card h1 { font-size: 1.8rem; text-align: center; margin-bottom: 0.5rem; color: #f8fafc; }
        .setup-card .subtitle { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.4rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-size: 1rem; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #00d2ff; }
        .btn-submit { width: 100%; padding: 0.9rem; background: #00d2ff; color: #0f172a; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
        .btn-submit:hover { background: #00b8d9; }
        .btn-submit:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .message { text-align: center; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .message.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }
        .message.error { background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); color: #f43f5e; }
        .message.info { background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.3); color: #00d2ff; }
        .completed { text-align: center; }
        .completed h2 { color: #10b981; margin-bottom: 1rem; }
        .completed a { color: #00d2ff; text-decoration: none; font-weight: 600; }
        .completed a:hover { text-decoration: underline; }
        .api-links { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #334155; text-align: center; }
        .api-links a { color: #64748b; font-size: 0.8rem; margin: 0 0.5rem; text-decoration: none; }
        .api-links a:hover { color: #00d2ff; }
    </style>
</head>
<body>
    <div class="setup-card">
        <div id="loading" style="text-align:center; padding: 2rem;">확인 중...</div>
        <div id="setup-form" style="display:none;">
            <h1>CMS 초기 설정</h1>
            <p class="subtitle">최초 관리자 계정을 생성합니다.</p>
            <div id="msg"></div>
            <form onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>관리자 이름</label>
                    <input type="text" id="name" required placeholder="관리자">
                </div>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="password" required placeholder="비밀번호 입력" minlength="4">
                </div>
                <div class="form-group">
                    <label>비밀번호 확인</label>
                    <input type="password" id="confirmPassword" required placeholder="비밀번호 다시 입력">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">관리자 계정 생성</button>
            </form>
            <div class="api-links">
                <a href="/swagger-ui.html">Swagger UI</a>
                <a href="/docs.html">API Docs (ReDoc)</a>
            </div>
        </div>
        <div id="completed" class="completed" style="display:none;">
            <h2>✓ 설정 완료</h2>
            <p style="color:#94a3b8; margin-bottom:1.5rem;">관리자 계정이 설정되었습니다.<br>잠시 후 사이트로 자동 이동합니다.</p>
            <p style="color:#64748b; font-size:0.85rem;">자동 이동되지 않으면 <a id="front-link" href="#">여기를 클릭</a>하세요.</p>
            <div class="api-links">
                <a href="/swagger-ui.html">Swagger UI</a>
                <a href="/docs.html">API Docs (ReDoc)</a>
            </div>
        </div>
    </div>
    <script>
        async function checkAdmin() {
            try {
                const res = await fetch('/api/setup/check');
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (data.hasAdmin) {
                    document.getElementById('completed').style.display = 'block';
                    document.getElementById('completed').querySelector('h2').textContent = '✓ 시스템 준비 완료';
                    document.getElementById('completed').querySelector('p').innerHTML = '관리자 계정이 이미 설정되어 있습니다.<br>잠시 후 사이트로 자동 이동합니다.';
                    var frontUrl = window.location.protocol + '//' + window.location.hostname + ':5173';
                    document.getElementById('front-link').href = frontUrl;
                    setTimeout(function() { window.location.href = frontUrl; }, 2000);
                } else {
                    document.getElementById('setup-form').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('loading').textContent = '서버 연결에 실패했습니다.';
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const msgEl = document.getElementById('msg');
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirmPassword').value;
            if (pw !== cpw) {
                msgEl.innerHTML = '<div class="message error">비밀번호가 일치하지 않습니다.</div>';
                return;
            }
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '생성 중...';
            try {
                const res = await fetch('/api/setup/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: pw
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('setup-form').style.display = 'none';
                    document.getElementById('completed').style.display = 'block';
                    // 3초 후 프론트엔드로 자동 이동
                    setTimeout(function() {
                        var frontUrl = window.location.protocol + '//' + window.location.hostname + ':5173';
                        window.location.href = frontUrl;
                    }, 3000);
                } else {
                    msgEl.innerHTML = '<div class="message error">' + (data.message || '오류가 발생했습니다.') + '</div>';
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('submitBtn').textContent = '관리자 계정 생성';
                }
            } catch (err) {
                msgEl.innerHTML = '<div class="message error">서버 오류가 발생했습니다.</div>';
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '관리자 계정 생성';
            }
        }

        checkAdmin();
    </script>
</body>
</html>
